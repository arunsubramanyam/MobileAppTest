name: Mobile App Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Android emulator + tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_3
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          disable-animations: true
          script: |
            adb devices

            echo "Waiting for emulator boot..."

            for i in $(seq 1 60); do
              boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$boot" = "1" ]; then
                break
              fi
              sleep 5
            done

            echo "Emulator ready"

            npx appium --log-level error &
            sleep 10

            npx wdio run ./wdio.conf.js --spec test/specs/signup.test.js

            npx wdio run ./wdio.conf.js --spec test/specs/golf.test.js