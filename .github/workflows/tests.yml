name: Mobile App Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - name: Start emulator + run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb devices

            echo "Waiting for emulator boot..."

            # IMPORTANT: robust boot check (no fragile syntax)
            boot_completed="0"
            while [ "$boot_completed" != "1" ]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              sleep 5
            done

            echo "Emulator ready"

            npx appium --log-level error &
            sleep 8

            npx wdio run ./wdio.conf.js --spec test/specs/signup.test.js

            npx wdio run ./wdio.conf.js --spec test/specs/golf.test.js